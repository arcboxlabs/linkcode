packages:
  - "apps/*"
  - "packages/*"

# pnpm 11 从 pnpm-workspace.yaml（而非 .npmrc）读取这些设置。
# hoisted 布局让三方依赖平铺，React Native / Expo 的 Metro 才能解析传递依赖
# （如 nativewind → react-native-css-interop）。
nodeLinker: hoisted
autoInstallPeers: true
strictPeerDependencies: false
# Turbo runs each package's script via `pnpm run`, which otherwise triggers a per-package deps check.
# With hoisted layout, dependency-less packages (schema/ipc) have no local node_modules, so that check
# falsely reports "node_modules missing". Turbo already orders/builds deps, so disable the per-run check.
verifyDepsBeforeRun: false

# pnpm 默认拦截依赖的安装脚本，这里显式放行需要编译/下载的原生包。
allowBuilds:
  "@biomejs/biome": true
  electron: true
  esbuild: true
  "@parcel/watcher": true
  core-js: true
  sharp: true
  # Transitive deps of the agent SDKs (pi / codex). Build scripts not needed for typecheck/build or
  # our default runtime path, so skip them explicitly to keep installs deterministic.
  "@google/genai": false
  protobufjs: false
  unrs-resolver: false

# 共享依赖版本集中在 catalog，业务包用 "catalog:" 引用，保证全仓一致。
# apps/mobile 的 React 版本同样走 catalog；react-native 仍由 Expo SDK 锁定。
catalog:
  # 语言 / 类型
  typescript: ^6.0.3
  "@types/node": ^25.9.3

  # 数据契约
  zod: ^4.4.3

  # React（web / desktop 渲染层）
  react: 19.2.7
  react-dom: 19.2.7
  react-router: ^7.18.0
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3

  # 客户端数据层
  "@tanstack/react-query": ^5.62.7
  swr: ^2.3.0
  use-intl: ^4.13.0
  lucide-react: ^1.18.0

  # web 构建
  vite: ^8.0.16
  "@vitejs/plugin-react": ^6.0.2
  babel-plugin-react-compiler: ^1.0.0

  # 样式（web / desktop 渲染层）
  tailwindcss: ^4.3.1
  "@tailwindcss/postcss": ^4.3.1
  "@tailwindcss/vite": ^4.3.1

  # desktop（Electron）
  electron: ^42.4.1
  electron-vite: ^5.0.0
  electron-builder: ^26.15.3

  # server / 通信
  ws: ^8.18.0
  "@types/ws": ^8.5.13
  socket.io: ^4.8.1
  socket.io-client: ^4.8.1

  # 构建 / 运行工具
  tsx: ^4.19.2
  tsup: ^8.3.5

  # 测试
  vitest: ^4.1.9

minimumReleaseAgeExclude:
  - '@anthropic-ai/claude-agent-sdk-darwin-arm64@0.3.179'
  - '@anthropic-ai/claude-agent-sdk-darwin-x64@0.3.179'
  - '@anthropic-ai/claude-agent-sdk-linux-arm64-musl@0.3.179'
  - '@anthropic-ai/claude-agent-sdk-linux-arm64@0.3.179'
  - '@anthropic-ai/claude-agent-sdk-linux-x64-musl@0.3.179'
  - '@anthropic-ai/claude-agent-sdk-linux-x64@0.3.179'
  - '@anthropic-ai/claude-agent-sdk-win32-arm64@0.3.179'
  - '@anthropic-ai/claude-agent-sdk-win32-x64@0.3.179'
  - '@anthropic-ai/claude-agent-sdk@0.3.179'
  - '@earendil-works/pi-agent-core@0.79.6'
  - '@earendil-works/pi-ai@0.79.6'
  - '@earendil-works/pi-coding-agent@0.79.6'
  - '@earendil-works/pi-tui@0.79.6'
  - electron@42.4.1
  - react-router@7.18.0
