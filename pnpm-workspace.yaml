  - "@expo/router-server@56.0.15"
  - babel-preset-expo@56.0.16
  - expo-asset@56.0.18
  - expo-modules-autolinking@56.0.17
  - expo-modules-core@56.0.18
  - expo@56.0.13
  - uuid@11.1.1
  - esbuild@0.28.1
  - ws@8.21.0
