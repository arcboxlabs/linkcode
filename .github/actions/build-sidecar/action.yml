# Builds the PTY sidecar (crates/linkcode-pty) for both release arches of the current platform
# and stages the binaries under apps/desktop/sidecar/${arch}, where electron-builder's
# extraResources expects them. Must run in the same job as the packaging step — the staged files
# feed it directly. The per-platform cross-target matrix lives in stage-sidecar.mts.
name: Build PTY sidecar
description: Cargo-build linkcode-pty for both arches and stage it for electron-builder

runs:
  using: composite
  steps:
    # The version comes from rust-toolchain.toml (no `toolchain` input).
    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        # The cross target per platform (the native target ships with the toolchain). Keep in
        # sync with CROSS_BUILDS in apps/desktop/scripts/stage-sidecar.mts.
        target: ${{ runner.os == 'macOS' && 'x86_64-apple-darwin' || runner.os == 'Windows' && 'aarch64-pc-windows-msvc' || 'aarch64-unknown-linux-gnu' }}
        rustflags: ''

    - name: Install aarch64 cross linker
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update -q
        sudo apt-get install -yq gcc-aarch64-linux-gnu

    # The runner image ships x64-only VC tools; linking aarch64-pc-windows-msvc needs the ARM64
    # component. A no-op when already present.
    - name: Install MSVC ARM64 build tools
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        $vsPath = & $vswhere -latest -products * -property installationPath
        $setup = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\setup.exe"
        Start-Process -Wait -FilePath $setup -ArgumentList `
          "modify", "--installPath", "`"$vsPath`"", `
          "--add", "Microsoft.VisualStudio.Component.VC.Tools.ARM64", `
          "--quiet", "--norestart", "--nocache"

    - name: Build and stage both arches
      shell: bash
      run: node apps/desktop/scripts/stage-sidecar.mts --all
