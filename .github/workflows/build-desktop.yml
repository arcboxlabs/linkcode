# Reusable build workflow for the Electron desktop app (@linkcode/desktop).
#
# PR builds stay unsigned (forks get no secrets). `sign: true` — the release flow — signs and
# notarizes inside the protected `release` environment, which holds all signing secrets.
# Windows Trusted Signing authenticates via OIDC federation (azure/login); no client secret exists.

name: Build Desktop

on:
  # Invoked by release-desktop.yml (caller must use `secrets: inherit`).
  workflow_call:
    inputs:
      ref:
        description: Git ref to build
        type: string
        required: false
        default: ""
      sign:
        description: Sign and notarize the build
        type: boolean
        required: false
        default: false
  # CI builds on PRs — unsigned.
  pull_request:
    paths:
      - "apps/desktop/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/build-desktop.yml"
  workflow_dispatch:
    inputs:
      sign:
        description: Sign and notarize the build
        type: boolean
        default: false

concurrency:
  group: build-desktop-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  id-token: write # OIDC token for azure/login (signed Windows builds); unused on PR builds

env:
  DESKTOP_DIR: apps/desktop
  DESKTOP_PACKAGE: "@linkcode/desktop" # name in package.json (used by `pnpm turbo --filter`)
  OUTPUT_DIR: apps/desktop/release # must match electron-builder `directories.output`

  # Trusted Signing identifiers — not credentials, but kept as `release` environment secrets so
  # the public repo doesn't advertise the signing infrastructure.
  AZURE_PUBLISHER_NAME: ${{ secrets.AZURE_PUBLISHER_NAME }} # must match the certificate subject CN exactly
  AZURE_SIGN_ENDPOINT: ${{ secrets.AZURE_SIGN_ENDPOINT }}
  AZURE_CODE_SIGNING_ACCOUNT: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT }}
  AZURE_CERTIFICATE_PROFILE: ${{ secrets.AZURE_CERTIFICATE_PROFILE }}

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    # Signing is gated by the `release` environment (secrets + tag policy); '' = no environment.
    environment: ${{ inputs.sign && 'release' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: blacksmith-6vcpu-macos-26 # arm64 (M4); Xcode 26 (actool >= 26) compiles mac.icon into Assets.car
            platform: mac
          # Temporarily macOS-only; the signing wiring below already covers Windows.
          # - os: blacksmith-4vcpu-ubuntu-2204 # older glibc => broader AppImage compatibility
          #   platform: linux
          # - os: blacksmith-4vcpu-windows-2025 # public beta; VS Build Tools only — enough for NSIS
          #   platform: win

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}

      # pnpm MUST be set up before setup-node so `cache: pnpm` can find the binary.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6 # reads version from package.json "packageManager"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm turbo run build --filter "${{ env.DESKTOP_PACKAGE }}..."
        env:
          # Inlined into the main bundle (a DSN is a publishable id, not a secret); only signed
          # builds carry it. Must stay declared in apps/desktop/turbo.json `build.env`.
          MAIN_VITE_SENTRY_DSN: ${{ inputs.sign && secrets.SENTRY_DSN_DESKTOP || '' }}

      # OIDC exchange for Windows Trusted Signing; Invoke-TrustedSigning (spawned by
      # electron-builder below) picks it up via DefaultAzureCredential's Azure CLI entry.
      - name: Azure login (Trusted Signing, OIDC)
        if: ${{ runner.os == 'Windows' && inputs.sign }}
        uses: azure/login@v2
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          allow-no-subscriptions: true

      - name: Package with electron-builder
        working-directory: ${{ env.DESKTOP_DIR }}
        shell: bash # unify quoting across runners for the conditional signing args below
        # azureSignOptions is injected via -c only on signed Windows builds so unsigned builds skip
        # signing instead of failing. ulimit: electron-builder's node-module-collector EMFILEs
        # walking this monorepo's node_modules even at 10240 — raise it hard.
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            ulimit -n 65536
          fi
          pnpm exec electron-builder --${{ matrix.platform }} --publish never \
            ${{ (runner.os == 'Windows' && inputs.sign) && format('-c.win.azureSignOptions.publisherName="{0}" -c.win.azureSignOptions.endpoint="{1}" -c.win.azureSignOptions.codeSigningAccountName="{2}" -c.win.azureSignOptions.certificateProfileName="{3}"', env.AZURE_PUBLISHER_NAME, env.AZURE_SIGN_ENDPOINT, env.AZURE_CODE_SIGNING_ACCOUNT, env.AZURE_CERTIFICATE_PROFILE) || '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # macOS signing + notarization (electron-builder drives notarytool).
          CSC_LINK: ${{ (runner.os == 'macOS' && inputs.sign) && secrets.MACOS_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ (runner.os == 'macOS' && inputs.sign) && secrets.MACOS_CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ inputs.sign && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ inputs.sign && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ inputs.sign && secrets.APPLE_TEAM_ID || '' }}
          # Stop macOS from signing with random keychain identities on unsigned builds.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ (runner.os == 'macOS' && inputs.sign) && 'true' || 'false' }}

          # Windows auth comes from the azure/login step — deliberately no AZURE_* credential env
          # here, so DefaultAzureCredential falls through to the CLI entry.

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.platform }}
          if-no-files-found: error
          retention-days: 7
          # *.yml + *.blockmap are the electron-updater feed — do not drop them.
          path: |
            ${{ env.OUTPUT_DIR }}/*.dmg
            ${{ env.OUTPUT_DIR }}/*.zip
            ${{ env.OUTPUT_DIR }}/*.exe
            ${{ env.OUTPUT_DIR }}/*.msi
            ${{ env.OUTPUT_DIR }}/*.appx
            ${{ env.OUTPUT_DIR }}/*.AppImage
            ${{ env.OUTPUT_DIR }}/*.deb
            ${{ env.OUTPUT_DIR }}/*.rpm
            ${{ env.OUTPUT_DIR }}/*.snap
            ${{ env.OUTPUT_DIR }}/*.yml
            ${{ env.OUTPUT_DIR }}/*.blockmap
