name: CI

on:
  push:
    branches:
      - master
      - release/*
  pull_request:
    paths-ignore:
      - '**.md'
  workflow_dispatch:
    inputs:
      release_type:
        type: choice
        options:
          - Dry Run
          - Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  typescript:
    name: TypeScript
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting and imports
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  all-green:
    name: All Green
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs:
      - typescript
    if: always()

    steps:
      - name: Check required jobs
        run: |
          if [ '${{ needs.typescript.result }}' != 'success' ]; then
            exit 1
          fi
