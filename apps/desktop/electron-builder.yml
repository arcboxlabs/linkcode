# Shared electron-builder base for @linkcode/desktop. Both channels extend it:
# electron-builder.release.yml (release) and electron-builder.devshell.yml (local dev shell); the
# packaging entry is chosen in scripts/package-app.mts. Do NOT pass this file to electron-builder
# directly — it declares no `protocols`, so a build off it would ship no deep-link scheme.
#
# Packaging only — the app itself is compiled by `electron-vite build` (run via
# `pnpm turbo run build`) into `out/`; electron-builder just wraps that output.
#
# Windows code signing is intentionally NOT declared here: Azure Trusted Signing
# (win.azureSignOptions) is injected by the release workflow via `-c` overrides so
# that unsigned PR builds skip signing instead of failing. See build-desktop.yml.

appId: com.arcboxlabs.linkcode.desktop
productName: LinkCode
copyright: Copyright © 2026 ArcBox Labs

# The `linkcode://` / `linkcode-dev://` deep-link scheme is declared per channel, NOT here. This
# base is shared by both channels, and electron-builder CONCATENATES arrays inherited via `extends`
# (builder-util-runtime deepAssign) — a shared `protocols` would leak `linkcode` into the dev shell
# and re-collide with release on the OS-global scheme. See the two channel configs.

# electron-builder needs an exact Electron version (it downloads per-platform binaries) and
# cannot read pnpm's `catalog:` protocol. Keep in sync with the `electron` catalog entry.
electronVersion: 42.4.1

# Keep only the Chromium locales for languages the app ships (packages/i18n/src/index.ts —
# extend this list when a locale is added there). Drops ~48 MB of framework .lproj/.pak data.
# The matcher lowercases but does NOT normalize separators, and locale file names differ per
# platform, so both spellings are load-bearing: mac frameworks use `en.lproj`/`zh_CN.lproj`
# (underscore), win/linux use `locales/en-US.pak`/`zh-CN.pak` (dash) — and Chromium requires
# its en-US default pak to exist.
electronLanguages:
  - en
  - en-US
  - zh-CN
  - zh_CN

directories:
  output: release # MUST match OUTPUT_DIR in .github/workflows/build-desktop.yml
  buildResources: build-resources # not `build/`: that path is gitignored and is a turbo build output

# electron-vite emits main, preload and renderer under `out/`. Production
# dependencies (electron-updater, electron-log) are added automatically.
files:
  - out/**
  - package.json
  # Agent CLI platform binaries are NOT shipped (CODE-114): the daemon spawns a detected user
  # install (agent-adapter runtime probe) or a managed download (CODE-111); only the SDK JS
  # stays. Shipping them would smartUnpack ~450 MB per app, host-arch only — broken cross-arch.
  # `@openai/codex` (the CLI carrier's JS entry) must survive these globs; only the
  # platform-suffixed packages match.
  - '!node_modules/@anthropic-ai/claude-agent-sdk-*/**'
  - '!node_modules/@openai/codex-darwin-*/**'
  - '!node_modules/@openai/codex-linux-*/**'
  - '!node_modules/@openai/codex-win32-*/**'
  # The pi npm closure needs no glob here (CODE-219): it is a managed download, and its SDK is a
  # devDependency of agent-adapter, so the `--prod deploy` staging never contains it.
  # verify-artifacts.mts guards against reintroduction.
  # Dead weight in the deploy closure (CODE-215). @linkcode/* are raw-TS workspace sources —
  # main/preload/daemon all bundle them, and migrations run from out/drizzle, so nothing resolves
  # them from node_modules at runtime. better-sqlite3/deps is the sqlite3 C amalgamation:
  # @electron/rebuild needs it at BUILD time (which is why the staging prune must not delete it),
  # but the compiled build/Release binding is all the app loads.
  - '!node_modules/@linkcode/**'
  - '!node_modules/better-sqlite3/deps/**'

# The PTY sidecar (crates/linkcode-pty), staged per arch by scripts/stage-sidecar.mjs. It is a
# real executable, so it must live outside the asar; the daemon supervisor points
# LINKCODE_PTY_SIDECAR_PATH at it under process.resourcesPath (src/main/daemon-supervisor.ts).
extraResources:
  - from: sidecar/${arch}
    to: .

# The electron-updater feed, served from Cloudflare R2 (uploads in release-desktop.yml). The
# /desktop prefix namespaces the bucket for future artifact families (agent runtime, daemon).
# This URL ships inside every released app — never change it.
publish:
  provider: generic
  url: https://releases.linkcode.ai/desktop

# Per-arch artifacts on every platform (half the download of a universal binary). The explicit
# ${arch} suffix is load-bearing: electron-updater picks the feed entry whose filename contains
# process.arch and falls back to the *first* entry otherwise — the default unsuffixed x64 name
# would send x64 clients whatever happens to be listed first.
artifactName: ${productName}-${version}-${arch}.${ext}

mac:
  # Apple Icon Composer source. Single shared copy at the repo-root assets/ dir (also consumed
  # by the mobile app via ios.icon); referenced here to avoid duplicating the bundle. electron-builder
  # runs `actool` (Xcode 26+) to emit Assets.car + CFBundleIconName (native Liquid Glass on
  # macOS 26) and a fallback Icon.icns. Windows/Linux use the shared assets/icon.png (win/linux below).
  icon: ../../assets/linkcode.icon
  category: public.app-category.developer-tools
  extendInfo:
    NSCameraUsageDescription: LinkCode needs camera access to attach photos or scan coding-session connection details.
    NSMicrophoneUsageDescription: LinkCode needs microphone access to attach audio context to coding-agent conversations.
    NSPhotoLibraryUsageDescription: LinkCode needs photo library access to attach images to coding-agent conversations.
    NSLocalNetworkUsageDescription: LinkCode needs local network access to discover and connect to your local LinkCode daemon.
    NSAppleEventsUsageDescription: LinkCode needs automation access only when you choose to connect coding-agent workflows with other apps.
    NSDocumentsFolderUsageDescription: LinkCode needs document access to attach files and open coding workspaces.
    NSDownloadsFolderUsageDescription: LinkCode needs downloads folder access to save coding-agent artifacts.
    NSDesktopFolderUsageDescription: LinkCode needs desktop folder access when you choose it as a coding workspace or artifact location.
    NSNetworkVolumesUsageDescription: LinkCode needs network volume access when you choose a workspace or artifact location on a network drive.
    NSRemovableVolumesUsageDescription: LinkCode needs removable volume access when you choose a workspace or artifact location on an external drive.
    NSBonjourServices:
      - _linkcode._tcp
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build-resources/entitlements.mac.plist
  entitlementsInherit: build-resources/entitlements.mac.inherit.plist
  notarize: true # notarytool via App Store Connect API key (APPLE_API_KEY / _KEY_ID / _ISSUER)
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip # REQUIRED for macOS auto-update (electron-updater pulls the .zip, not the .dmg)
      arch: [x64, arm64]

# UDBZ (bzip2) instead of the default ULFO (lzfse): smaller first-download dmg for slower mount.
# ULMO (lzma) would be smaller still but electron-builder's schema doesn't accept it. Only the
# dmg is affected — auto-update pulls the zip, whose deflate format electron-updater requires.
dmg:
  format: UDBZ

win:
  icon: ../../assets/icon.png # shared repo-root raster (no Liquid Glass on Windows)
  target:
    - target: nsis
      arch: [x64, arm64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  # One installer per arch. NSIS otherwise merges every arch into a single universal installer,
  # which doubles the download and defeats the per-arch artifactName above.
  buildUniversalInstaller: false

linux:
  # A DIRECTORY of per-size PNGs, not a single raster: app-builder-lib 26+ no longer expands one
  # PNG into a size set (a lone 1024² lands in hicolor/1024x1024, which gtk-update-icon-cache skips
  # → GNOME shows the generic-executable fallback). The dir installs the standard 16→512 hicolor
  # sizes so the launcher resolves the icon. Uses the full app-icon squircle (like mac), not the
  # bare mark shared with Windows. Regenerate from assets/icon-dock.png; see scripts/package-app.mts.
  icon: ../../assets/linux-icons
  category: Development
  # The npm package name (@linkcode/desktop) sanitizes to an invalid binary name; name the
  # executable explicitly.
  executableName: linkcode
  target:
    - target: AppImage # the only Linux format electron-updater can self-update
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]
  # rpm/snap need extra host tooling (rpm/fakeroot, snapcraft); add install steps to
  # build-desktop.yml's Linux job before enabling them here.
